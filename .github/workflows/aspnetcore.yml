name: aspnetcore

on:
  push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_PROJECT_PATH: src/Polecat.AspNetCore.Testing/Polecat.AspNetCore.Testing.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.TEST_PROJECT_PATH }} -c Release --no-restore

      - name: Start containers
        run: docker compose up -d

      - name: Wait for SQL Server to be healthy
        run: |
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' polecat-sqlserver)
            if [ "$STATUS" == "healthy" ]; then
              echo "SQL Server is ready!"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i)"
            sleep 5
          done
          echo "SQL Server failed to become healthy"
          exit 1

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} -c Release --no-build --framework net9.0

      - name: Stop containers
        if: always()
        run: docker compose down
