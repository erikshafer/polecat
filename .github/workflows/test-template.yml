name: test-template

on:
  workflow_call:
    inputs:
      TEST_PROJECT_PATH:
        required: true
        type: string
      STORAGE_TYPE:
        required: false
        type: string
        default: "default"
      TEST_FILTERS:
        required: false
        type: string
        default: "Category!=Flaky"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_PROJECT_PATH: ${{ inputs.TEST_PROJECT_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.TEST_PROJECT_PATH }} -c Release --no-restore

      - name: Start SQL Server
        run: |
          if [ "${{ inputs.STORAGE_TYPE }}" = 'edge' ]; then
            docker compose -f docker-compose.yml -f docker-compose.azure-sql-edge.yml up -d
          else
            docker compose up -d
          fi

      - name: Wait for SQL Server to be healthy
        run: |
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' polecat-sqlserver)
            if [ "$STATUS" == "healthy" ]; then
              echo "SQL Server is ready!"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i)"
            sleep 5
          done
          echo "SQL Server failed to become healthy"
          exit 1

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} -c Release --no-build --framework net9.0 --logger "trx;LogFileName=test-results.trx" --filter "${{ inputs.TEST_FILTERS }}"  

      - name: Report results
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: xUnit Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          list-suites: "failed"
          list-tests: "failed"

      - name: Stop containers
        if: ${{ always() }}
        run: docker compose down
