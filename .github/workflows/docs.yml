name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
      inputs:
        publish_docs:
          description: 'Publish docs'
          type: boolean
          default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs-build

      - name: Deploy docs
        run: npm run deploy
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.publish_docs == 'true') }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

